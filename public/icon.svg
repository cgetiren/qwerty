<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)">
    <!-- Chat bubble -->
    <path d="M-120,-80 L120,-80 Q140,-80 140,-60 L140,30 Q140,50 120,50 L20,50 L0,80 L-20,50 L-120,50 Q-140,50 -140,30 L-140,-60 Q-140,-80 -120,-80 Z" fill="url(#accent)" opacity="0.9"/>
    <!-- Signal bars (live monitoring) -->
    <rect x="-60" y="-30" width="16" height="50" rx="4" fill="#0f172a" opacity="0.8"/>
    <rect x="-30" y="-45" width="16" height="65" rx="4" fill="#0f172a" opacity="0.8"/>
    <rect x="0" y="-55" width="16" height="75" rx="4" fill="#0f172a" opacity="0.8"/>
    <rect x="30" y="-40" width="16" height="60" rx="4" fill="#0f172a" opacity="0.8"/>
    <rect x="60" y="-20" width="16" height="40" rx="4" fill="#0f172a" opacity="0.8"/>
  </g>
  <!-- AI sparkle -->
  <circle cx="380" cy="120" r="8" fill="#fbbf24"/>
  <circle cx="400" cy="100" r="5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="360" cy="105" r="4" fill="#fbbf24" opacity="0.4"/>
  <!-- LT text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="#94a3b8" letter-spacing="8">LIVE</text>
</svg>
